version: 2
updates:
  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: chore
    groups:
      cargo:
        patterns: ["*"]
    ignore:
      # rusqlite is pinned to 0.37 on purpose: 0.40 pulls libsqlite3-sys 0.38.1,
      # which uses the unstable `cfg_select!` macro and fails to build on stable.
      - dependency-name: "rusqlite"
        versions: [">=0.38"]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: chore
    groups:
      actions:
        patterns: ["*"]
